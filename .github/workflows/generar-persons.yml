name: Generar JSON persons desde Excel

on:
  push:
    paths:
      - 'data/Base_dades.xlsx'
      - 'scripts/excel_to_json.py'
      - '.github/workflows/generar-persons.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar-json:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl

      - name: Generar JSONs
        run: python scripts/excel_to_json.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/persons/*.json data/index.json
          git diff --cached --quiet || git commit -m "Genera persons desde Base_dades.xlsx"
          git push
